<!DOCTYPE html>
<html lang="en">
    <head>
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name ="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta charset="utf-8"/>
        <meta http-equiv="pragma" content="no-cache"/>
        <title>Project1</title>
        <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Cairo:wght@700;900&display=swap" rel="stylesheet">
        <style>
            body {
                background: #0;
                color: #cccccc;
                margin: 0px;
                padding: 0px;
                border: 0px;
            }
            canvas {
                image-rendering: optimizeSpeed;
                -webkit-interpolation-mode: nearest-neighbor;
                -ms-touch-action: none;
                touch-action: none;
                margin: 0px;
                padding: 0px;
                border: 0px;
            }
            :-webkit-full-screen #canvas { width: 100%; height: 100%; }
            :-webkit-full-screen { width: 100%; height: 100%; }
            div.gm4html5_div_class { margin: 0px; padding: 0px; border: 0px; }
            div.gm4html5_login { padding: 20px; position: absolute; border: solid 2px #000000; background-color: #404040; color:#00ff00; border-radius: 15px; box-shadow: #101010 20px 20px 40px; }
            div.gm4html5_cancel_button { float: right; }
            div.gm4html5_login_button { float: left; }
            div.gm4html5_login_header { text-align: center; }

            /* ======= MENU OVERLAY ======= */
            #MENU_OVERLAY {
                position: fixed;
                inset: 0;
                background: #000;
                z-index: 9000;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                font-family: 'Cinzel', serif;
            }

            /* Grid bg */
            #MENU_OVERLAY::before {
                content: '';
                position: absolute;
                inset: 0;
                background-image:
                    linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);
                background-size: 65px 65px;
                pointer-events: none;
            }

            /* Corners */
            .M_C {
                position: absolute;
                width: 44px; height: 44px;
                border-color: rgba(255,255,255,.2);
                border-style: solid;
            }
            .M_TL { top:24px; left:24px; border-width:1px 0 0 1px; }
            .M_TR { top:24px; right:24px; border-width:1px 1px 0 0; }
            .M_BL { bottom:24px; left:24px; border-width:0 0 1px 1px; }
            .M_BR { bottom:24px; right:24px; border-width:0 1px 1px 0; }

            /* Lang */
            #M_LANG {
                position: absolute;
                top: 28px; right: 75px;
                display: flex;
                border: 1px solid rgba(255,255,255,.2);
                overflow: hidden;
            }
            html[dir=rtl] #M_LANG { right:auto; left:75px; }

            .M_LB {
                padding: 6px 15px;
                background: transparent; border: none;
                color: rgba(255,255,255,.3);
                font-family: 'Cinzel', serif;
                font-size: 9px; letter-spacing: 2px;
                cursor: pointer; transition: all .2s;
            }
            .M_LB.on { background: #fff; color: #000; }
            .M_LB:hover:not(.on) { color: #fff; }

            /* Title */
            .M_TITLE {
                font-family: 'Cinzel', serif;
                font-weight: 900;
                font-size: clamp(36px, 6vw, 78px);
                letter-spacing: .18em;
                color: #fff;
                text-align: center;
                position: relative; z-index: 1;
                animation: M_FU .8s cubic-bezier(.16,1,.3,1) forwards;
                opacity: 0;
            }
            html[dir=rtl] .M_TITLE { font-family:'Cairo',sans-serif; letter-spacing:.04em; }

            .M_SUB {
                font-size: clamp(8px,1vw,11px);
                letter-spacing: .5em;
                color: rgba(255,255,255,.28);
                margin-top: 8px; margin-bottom: 48px;
                text-transform: uppercase;
                position: relative; z-index:1;
                animation: M_FU .8s .12s cubic-bezier(.16,1,.3,1) forwards;
                opacity: 0;
            }
            html[dir=rtl] .M_SUB { font-family:'Cairo',sans-serif; letter-spacing:.06em; }

            .M_DIV {
                width: 1px; height: 30px;
                background: rgba(255,255,255,.18);
                margin: 0 auto 36px;
                position: relative; z-index:1;
                animation: M_GY .6s .22s ease forwards;
                transform: scaleY(0); transform-origin: top;
            }

            /* Buttons */
            .M_BTNS {
                display: flex; flex-direction: column;
                align-items: center; gap: 6px;
                position: relative; z-index:1;
            }

            .M_BTN {
                position: relative;
                display: flex; align-items: center; justify-content: center;
                padding: 12px 50px; min-width: 270px;
                background: transparent;
                border: 1px solid transparent;
                color: rgba(255,255,255,.38);
                font-family: 'Cinzel', serif;
                font-size: clamp(11px,1.4vw,14px);
                font-weight: 700; letter-spacing: .35em;
                text-transform: uppercase;
                cursor: pointer; transition: all .25s;
                animation: M_SI .5s ease forwards; opacity: 0;
            }
            html[dir=rtl] .M_BTN { font-family:'Cairo',sans-serif; letter-spacing:.04em; }
            .M_BTN:nth-child(1) { animation-delay:.3s; }
            .M_BTN:nth-child(2) { animation-delay:.4s; }
            .M_BTN:hover { color:#fff; border-color:rgba(255,255,255,.25); background:rgba(255,255,255,.04); }

            .M_BTN.PRI {
                color:#fff; border-color:rgba(255,255,255,.55);
                font-size:clamp(13px,1.6vw,16px); letter-spacing:.4em;
                animation-name: M_SIP;
            }
            html[dir=rtl] .M_BTN.PRI { letter-spacing:.06em; }
            .M_BTN.PRI:hover { background:#fff; color:#000; border-color:#fff; }

            .M_NUM {
                position:absolute; left:14px;
                font-size:7px; color:rgba(255,255,255,.15);
                letter-spacing:.05em; font-weight:400;
            }
            html[dir=rtl] .M_NUM { left:auto; right:14px; }

            /* Footer */
            .M_FOOT {
                position:absolute; bottom:28px;
                left:50%; transform:translateX(-50%);
                font-size:7px; letter-spacing:.3em;
                color:rgba(255,255,255,.1); white-space:nowrap;
            }
            html[dir=rtl] .M_FOOT { font-family:'Cairo',sans-serif; letter-spacing:.04em; font-size:9px; }

            /* POTATO */
            #M_POTATO {
                position: fixed; bottom: 48px;
                pointer-events: none; z-index: 9100;
                width: 100px; height: 100px;
                transform: translateX(-50%);
                filter: drop-shadow(0 0 20px rgba(255,255,255,.14));
            }
            #M_POTATO img { width:100%; height:100%; object-fit:contain; display:block; }

            /* CREDITS PANEL */
            #M_CRED {
                position: fixed; inset:0;
                background: rgba(0,0,0,.97);
                z-index: 9500;
                display: none;
                flex-direction: column;
                align-items: center; justify-content: center;
            }
            #M_CRED.show { display:flex; }

            .M_CBOX {
                border: 1px solid rgba(255,255,255,.15);
                padding: 44px 56px;
                max-width: 480px; width: 88%;
                text-align: center;
                animation: M_FU .35s ease forwards;
            }

            .M_CT {
                font-size:9px; letter-spacing:.5em;
                color:rgba(255,255,255,.3); margin-bottom:24px;
                font-family:'Cinzel',serif;
            }
            html[dir=rtl] .M_CT { font-family:'Cairo',sans-serif; letter-spacing:.08em; font-size:11px; }

            .M_CNAME {
                font-family:'Cinzel',serif; font-weight:900;
                font-size:clamp(24px,3.5vw,38px);
                letter-spacing:.14em; color:#fff; margin-bottom:6px;
            }

            .M_CGAME {
                font-size:10px; letter-spacing:.3em;
                color:rgba(255,255,255,.4); margin-bottom:6px;
            }
            html[dir=rtl] .M_CGAME { font-family:'Cairo',sans-serif; letter-spacing:.06em; font-size:11px; }

            .M_CNOTE {
                font-size:10px; letter-spacing:.15em;
                color:rgba(255,255,255,.28); margin-bottom:28px;
                line-height:1.9;
            }
            html[dir=rtl] .M_CNOTE { font-family:'Cairo',sans-serif; letter-spacing:.04em; font-size:12px; }

            .M_CLINE { width:100%; height:1px; background:rgba(255,255,255,.1); margin-bottom:22px; }

            .M_CLINKS { display:flex; flex-direction:column; gap:8px; }

            .M_CLNK {
                display:flex; align-items:center; justify-content:space-between;
                padding:10px 14px;
                border:1px solid rgba(255,255,255,.1);
                color:rgba(255,255,255,.45); text-decoration:none;
                font-family:'Cinzel',serif;
                font-size:9px; letter-spacing:.22em;
                transition:all .22s; cursor:pointer;
            }
            html[dir=rtl] .M_CLNK { font-family:'Cairo',sans-serif; letter-spacing:.04em; font-size:10px; }
            .M_CLNK:hover { color:#fff; border-color:rgba(255,255,255,.38); background:rgba(255,255,255,.04); }
            .M_CLNK .AR { color:rgba(255,255,255,.22); font-size:10px; }

            .M_CPAY {
                display:flex; align-items:center; justify-content:space-between;
                padding:12px 14px; margin-top:8px;
                border:1px solid rgba(255,255,255,.45);
                color:#fff; text-decoration:none;
                font-family:'Cinzel',serif;
                font-size:9px; letter-spacing:.22em;
                transition:all .22s; cursor:pointer;
            }
            html[dir=rtl] .M_CPAY { font-family:'Cairo',sans-serif; letter-spacing:.04em; font-size:11px; }
            .M_CPAY:hover { background:#fff; color:#000; border-color:#fff; }

            .M_CBCK {
                margin-top:24px; background:transparent; border:none;
                color:rgba(255,255,255,.28); font-family:'Cinzel',serif;
                font-size:9px; letter-spacing:.3em; cursor:pointer; transition:color .2s;
            }
            html[dir=rtl] .M_CBCK { font-family:'Cairo',sans-serif; letter-spacing:.04em; font-size:11px; }
            .M_CBCK:hover { color:#fff; }

            /* Animations */
            @keyframes M_FU { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
            @keyframes M_SI { from{opacity:0;transform:translateX(-10px)} to{opacity:.38;transform:translateX(0)} }
            @keyframes M_SIP { from{opacity:0;transform:translateX(-10px)} to{opacity:1;transform:translateX(0)} }
            @keyframes M_GY { to{transform:scaleY(1)} }
        </style>
    </head>

    <body>

        <!-- ======= MENU OVERLAY ======= -->
        <div id="MENU_OVERLAY">
            <div class="M_C M_TL"></div>
            <div class="M_C M_TR"></div>
            <div class="M_C M_BL"></div>
            <div class="M_C M_BR"></div>

            <div id="M_LANG">
                <button class="M_LB on" onclick="M_SetLang('en',this)">EN</button>
                <button class="M_LB" onclick="M_SetLang('ar',this)">AR</button>
            </div>

            <h1 class="M_TITLE" id="M_T">PROJECT 1</h1>
            <p class="M_SUB" id="M_S">POTATO ADVENTURE</p>
            <div class="M_DIV"></div>

            <div class="M_BTNS">
                <button class="M_BTN PRI" onclick="M_Play()">
                    <span class="M_NUM">01</span>
                    <span id="M_BP">PLAY</span>
                </button>
                <button class="M_BTN" onclick="M_OpenCred()">
                    <span class="M_NUM">02</span>
                    <span id="M_BC">CREDITS</span>
                </button>
            </div>

            <div class="M_FOOT" id="M_F">BY ZX87S</div>
        </div>

        <!-- Potato -->
        <div id="M_POTATO"><img id="M_PIMG" src="P_S.png" alt=""></div>

        <!-- Credits -->
        <div id="M_CRED">
            <div class="M_CBOX">
                <div class="M_CT" id="C_T">CREDITS</div>
                <div class="M_CNAME">Zx87s</div>
                <div class="M_CGAME" id="C_G">مغامرة البطاطس · POTATO ADVENTURE</div>
                <div class="M_CNOTE" id="C_N">This game is incomplete.<br>Support via PayPal.</div>
                <div class="M_CLINE"></div>
                <div class="M_CLINKS">
                    <a class="M_CPAY" href="https://paypal.me/AlowagamerYT" target="_blank" rel="noopener">
                        <span id="C_PAY">SUPPORT ON PAYPAL</span><span class="AR">↗</span>
                    </a>
                    <a class="M_CLNK" href="https://www.youtube.com/@Zx87s" target="_blank" rel="noopener">
                        <span id="C_YT">YOUTUBE</span><span class="AR">↗</span>
                    </a>
                    <a class="M_CLNK" href="https://www.tiktok.com/@zx87ss" target="_blank" rel="noopener">
                        <span id="C_TK">TIKTOK</span><span class="AR">↗</span>
                    </a>
                </div>
                <button class="M_CBCK" onclick="M_CloseCred()" id="C_BK">← BACK</button>
            </div>
        </div>

        <!-- ======= ORIGINAL GAME CODE (UNTOUCHED) ======= -->
        <div class="gm4html5_div_class" id="gm4html5_div_id">
            <canvas id="canvas" width="1920" height="1080">
                <p>Your browser doesn't support HTML5 canvas.</p>
            </canvas>
        </div>

        <script type="text/javascript" src="html5game/Project1.js?cachebust=853991166"></script>

        <script>
        // POTATO FOLLOW
        var M_mx = window.innerWidth/2, M_cx = window.innerWidth/2, M_sp = 'S';
        var M_pimg = document.getElementById('M_PIMG');
        var M_pot = document.getElementById('M_POTATO');

        document.addEventListener('mousemove', function(e) {
            M_mx = e.clientX;
            var d = e.clientX - window.innerWidth/2;
            var ns = d > 80 ? 'D' : d < -80 ? 'A' : 'S';
            if (ns !== M_sp) { M_sp = ns; M_pimg.src = 'P_' + ns + '.png'; }
        });
        (function ap() {
            M_cx += (M_mx - M_cx) * 0.07;
            var mg = 85;
            M_pot.style.left = (mg + (window.innerWidth - mg*2) * (M_cx/window.innerWidth)) + 'px';
            requestAnimationFrame(ap);
        })();

        // LANG
        var ML = {
            en:{ t:'PROJECT 1', s:'POTATO ADVENTURE', p:'PLAY', c:'CREDITS', ct:'CREDITS', cn:'This game is incomplete.<br>Support via PayPal.', pay:'SUPPORT ON PAYPAL', yt:'YOUTUBE', tk:'TIKTOK', bk:'← BACK' },
            ar:{ t:'مشروع 1', s:'مغامرة البطاطس', p:'العب', c:'الفريق', ct:'الفريق', cn:'اللعبة غير مكتملة.<br>للدعم عبر PayPal.', pay:'ادعم عبر باي بال', yt:'يوتيوب', tk:'تيك توك', bk:'← رجوع' }
        };

        function M_SetLang(lang, btn) {
            var t = ML[lang];
            document.querySelectorAll('.M_LB').forEach(function(b){ b.classList.remove('on'); });
            btn.classList.add('on');
            document.documentElement.setAttribute('lang', lang);
            document.documentElement.setAttribute('dir', lang==='ar'?'rtl':'ltr');
            document.getElementById('M_T').textContent = t.t;
            document.getElementById('M_S').textContent = t.s;
            document.getElementById('M_BP').textContent = t.p;
            document.getElementById('M_BC').textContent = t.c;
            document.getElementById('C_T').textContent = t.ct;
            document.getElementById('C_N').innerHTML = t.cn;
            document.getElementById('C_PAY').textContent = t.pay;
            document.getElementById('C_YT').textContent = t.yt;
            document.getElementById('C_TK').textContent = t.tk;
            document.getElementById('C_BK').textContent = t.bk;
        }

        function M_OpenCred() { document.getElementById('M_CRED').classList.add('show'); }
        function M_CloseCred() { document.getElementById('M_CRED').classList.remove('show'); }

        function M_Play() {
            var ov = document.getElementById('MENU_OVERLAY');
            var pt = document.getElementById('M_POTATO');
            ov.style.transition = 'opacity .5s';
            ov.style.opacity = '0';
            pt.style.transition = 'opacity .5s';
            pt.style.opacity = '0';
            setTimeout(function() {
                ov.style.display = 'none';
                pt.style.display = 'none';
                try { new (window.AudioContext||window.webkitAudioContext)().resume(); } catch(e){}
                GameMaker_Init();
            }, 500);
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') M_CloseCred();
            if ((e.key==='Enter'||e.key===' ') && document.getElementById('MENU_OVERLAY').style.display!=='none') M_Play();
        });
        </script>

    </body>
</html>
