<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
    <meta charset="utf-8"/>
    <meta http-equiv="pragma" content="no-cache"/>
    <title>Project1</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #000000;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--black);
            color: var(--white);
            font-family: 'Cinzel', serif;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            cursor: none;
        }

        /* Custom Cursor */
        #cursor {
            position: fixed;
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            mix-blend-mode: difference;
            transition: width 0.2s, height 0.2s;
        }
        #cursor.hover { width: 36px; height: 36px; }

        /* Loading */
        #loadScreen {
            position: fixed;
            inset: 0;
            background: black;
            z-index: 999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            transition: opacity 0.5s;
        }
        .load-text {
            font-size: 10px;
            letter-spacing: 0.6em;
            color: rgba(255,255,255,0.35);
        }
        .bar-track {
            width: 180px;
            height: 1px;
            background: rgba(255,255,255,0.1);
        }
        .bar-fill {
            height: 1px;
            background: white;
            width: 0%;
            transition: width 0.2s;
        }

        /* Menu */
        #menuScreen {
            position: fixed;
            inset: 0;
            background: black;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        /* Grid */
        #menuScreen::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
            background-size: 70px 70px;
            pointer-events: none;
        }

        /* Scanlines */
        #menuScreen::after {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                0deg, transparent, transparent 3px,
                rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px
            );
            pointer-events: none;
        }

        /* Corners */
        .corner {
            position: absolute;
            width: 50px;
            height: 50px;
            border-color: rgba(255,255,255,0.25);
            border-style: solid;
        }
        .corner-tl { top: 28px; left: 28px; border-width: 1px 0 0 1px; }
        .corner-tr { top: 28px; right: 28px; border-width: 1px 1px 0 0; }
        .corner-bl { bottom: 28px; left: 28px; border-width: 0 0 1px 1px; }
        .corner-br { bottom: 28px; right: 28px; border-width: 0 1px 1px 0; }

        /* Lang */
        #langToggle {
            position: absolute;
            top: 32px;
            right: 90px;
            display: flex;
            border: 1px solid rgba(255,255,255,0.2);
            overflow: hidden;
        }
        html[dir="rtl"] #langToggle { right: auto; left: 90px; }
        .lang-btn {
            padding: 7px 18px;
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.35);
            font-family: 'Cinzel', serif;
            font-size: 10px;
            letter-spacing: 2px;
            cursor: none;
            transition: all 0.25s;
        }
        .lang-btn.active { background: white; color: black; }
        .lang-btn:hover:not(.active) { color: white; }

        /* Title */
        .menu-title {
            font-family: 'Cinzel', serif;
            font-size: clamp(42px, 7vw, 90px);
            font-weight: 900;
            letter-spacing: 0.18em;
            color: white;
            text-align: center;
            animation: fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) forwards;
            opacity: 0;
        }
        html[dir="rtl"] .menu-title { font-family: 'Cairo', sans-serif; letter-spacing: 0.05em; }

        .menu-sub {
            font-size: clamp(9px, 1.2vw, 12px);
            letter-spacing: 0.55em;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            margin-top: 10px;
            margin-bottom: 60px;
            animation: fadeUp 0.9s 0.15s cubic-bezier(0.16,1,0.3,1) forwards;
            opacity: 0;
        }
        html[dir="rtl"] .menu-sub { font-family: 'Cairo', sans-serif; letter-spacing: 0.1em; }

        .divider {
            width: 1px;
            height: 36px;
            background: rgba(255,255,255,0.18);
            margin: 0 auto 44px;
            animation: growLine 0.7s 0.25s ease forwards;
            transform: scaleY(0);
            transform-origin: top;
        }

        /* Buttons */
        .menu-items {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            position: relative;
            z-index: 1;
        }

        .menu-btn {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 13px 56px;
            min-width: 300px;
            background: transparent;
            border: 1px solid transparent;
            color: rgba(255,255,255,0.4);
            font-family: 'Cinzel', serif;
            font-size: clamp(11px, 1.5vw, 15px);
            font-weight: 700;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            cursor: none;
            transition: all 0.28s ease;
            animation: slideIn 0.5s ease forwards;
            opacity: 0;
        }
        html[dir="rtl"] .menu-btn { font-family: 'Cairo', sans-serif; letter-spacing: 0.05em; }

        .menu-btn:nth-child(1) { animation-delay: 0.35s; }
        .menu-btn:nth-child(2) { animation-delay: 0.45s; }
        .menu-btn:nth-child(3) { animation-delay: 0.55s; }
        .menu-btn:nth-child(4) { animation-delay: 0.65s; }

        .menu-btn:hover {
            color: white;
            border-color: rgba(255,255,255,0.25);
            background: rgba(255,255,255,0.04);
        }

        .menu-btn.primary {
            color: white;
            border-color: rgba(255,255,255,0.6);
            font-size: clamp(13px, 1.7vw, 17px);
            letter-spacing: 0.4em;
        }
        .menu-btn.primary:hover {
            background: white;
            color: black;
            border-color: white;
            letter-spacing: 0.5em;
        }

        .btn-num {
            position: absolute;
            left: 18px;
            font-size: 8px;
            color: rgba(255,255,255,0.18);
            letter-spacing: 0.1em;
            font-weight: 400;
        }
        html[dir="rtl"] .btn-num { left: auto; right: 18px; }

        /* Footer */
        .menu-footer {
            position: absolute;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 8px;
            letter-spacing: 0.35em;
            color: rgba(255,255,255,0.12);
            white-space: nowrap;
            text-transform: uppercase;
        }
        html[dir="rtl"] .menu-footer { font-family: 'Cairo', sans-serif; letter-spacing: 0.05em; }

        .menu-ver {
            position: absolute;
            bottom: 32px;
            left: 32px;
            font-size: 8px;
            letter-spacing: 0.2em;
            color: rgba(255,255,255,0.12);
        }

        /* Potato */
        #potato {
            position: fixed;
            bottom: 55px;
            pointer-events: none;
            z-index: 200;
            width: 110px;
            height: 110px;
            transform: translateX(-50%);
            filter: drop-shadow(0 0 25px rgba(255,255,255,0.15));
            transition: filter 0.3s;
        }
        #potato img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        /* Animations */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-15px); }
            to { opacity: 0.4; transform: translateX(0); }
        }
        .menu-btn.primary { animation-name: slideInPrimary; }
        @keyframes slideInPrimary {
            from { opacity: 0; transform: translateX(-15px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes growLine {
            to { transform: scaleY(1); }
        }

        /* Game */
        #gameScreen {
            display: none;
            width: 100vw;
            height: 100vh;
            align-items: center;
            justify-content: center;
        }
        #gameScreen.active { display: flex; }
        #gm4html5_div_id {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        canvas {
            max-width: 100vw;
            max-height: 100vh;
            image-rendering: pixelated;
            -ms-touch-action: none;
            touch-action: none;
        }
        div.gm4html5_div_class { margin:0; padding:0; border:0; }
    </style>
</head>
<body>

<div id="cursor"></div>

<!-- Loading -->
<div id="loadScreen">
    <div class="load-text" id="loadTxt">LOADING</div>
    <div class="bar-track"><div class="bar-fill" id="barFill"></div></div>
</div>

<!-- Menu -->
<div id="menuScreen">
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div id="langToggle">
        <button class="lang-btn active" onclick="setLang('en')">EN</button>
        <button class="lang-btn" onclick="setLang('ar')">AR</button>
    </div>

    <h1 class="menu-title" id="mTitle">PROJECT 1</h1>
    <p class="menu-sub" id="mSub">THE POTATO ADVENTURE</p>
    <div class="divider"></div>

    <div class="menu-items">
        <button class="menu-btn primary" onclick="startGame()">
            <span class="btn-num">01</span>
            <span id="bPlay">PLAY</span>
        </button>
        <button class="menu-btn">
            <span class="btn-num">02</span>
            <span id="bSettings">SETTINGS</span>
        </button>
        <button class="menu-btn">
            <span class="btn-num">03</span>
            <span id="bControls">CONTROLS</span>
        </button>
        <button class="menu-btn">
            <span class="btn-num">04</span>
            <span id="bCredits">CREDITS</span>
        </button>
    </div>

    <div class="menu-ver">v1.0.0</div>
    <div class="menu-footer" id="mFooter">MOVE MOUSE · GUIDE THE POTATO</div>

    <div id="potato"><img id="potatoImg" src="P_S.png" alt=""></div>
</div>

<!-- Game -->
<div id="gameScreen">
    <div class="gm4html5_div_class" id="gm4html5_div_id">
        <canvas id="canvas" width="1920" height="1080">
            <p>Your browser doesn't support HTML5 canvas.</p>
        </canvas>
    </div>
</div>

<script type="text/javascript" src="html5game/Project1.js?cachebust=853991166"></script>
<script>

// CURSOR
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
});
document.querySelectorAll('button').forEach(el => {
    el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
    el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
});

// LOADING
let pct = 0;
const bar = document.getElementById('barFill');
const iv = setInterval(() => {
    pct += Math.random() * 18;
    if (pct >= 100) {
        pct = 100;
        clearInterval(iv);
        setTimeout(() => {
            const ls = document.getElementById('loadScreen');
            ls.style.opacity = '0';
            setTimeout(() => {
                ls.style.display = 'none';
                document.getElementById('menuScreen').style.display = 'flex';
            }, 500);
        }, 300);
    }
    bar.style.width = Math.min(pct, 100) + '%';
}, 100);

// POTATO
const potato = document.getElementById('potato');
const potatoImg = document.getElementById('potatoImg');
let mouseX = window.innerWidth / 2;
let curX = window.innerWidth / 2;
let sprite = 'S';
const DZ = 90;

document.addEventListener('mousemove', e => {
    mouseX = e.clientX;
    const d = e.clientX - window.innerWidth / 2;
    const ns = d > DZ ? 'D' : d < -DZ ? 'A' : 'S';
    if (ns !== sprite) {
        sprite = ns;
        potatoImg.src = 'P_' + ns + '.png';
    }
});

(function animPotato() {
    curX += (mouseX - curX) * 0.07;
    const margin = 90;
    const range = window.innerWidth - margin * 2;
    const pct = (curX - 0) / window.innerWidth;
    potato.style.left = (margin + range * pct) + 'px';
    requestAnimationFrame(animPotato);
})();

// LANGUAGE
const T = {
    en: { title:'PROJECT 1', sub:'THE POTATO ADVENTURE', play:'PLAY', settings:'SETTINGS', controls:'CONTROLS', credits:'CREDITS', footer:'MOVE MOUSE · GUIDE THE POTATO', load:'LOADING' },
    ar: { title:'مشروع 1', sub:'مغامرة البطاطس', play:'العب', settings:'الإعدادات', controls:'التحكم', credits:'الفريق', footer:'حرّك الماوس لتوجيه البطاطس', load:'جاري التحميل' }
};

function setLang(lang) {
    const t = T[lang];
    const html = document.documentElement;
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    html.setAttribute('lang', lang);
    html.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
    document.getElementById('mTitle').textContent = t.title;
    document.getElementById('mSub').textContent = t.sub;
    document.getElementById('bPlay').textContent = t.play;
    document.getElementById('bSettings').textContent = t.settings;
    document.getElementById('bControls').textContent = t.controls;
    document.getElementById('bCredits').textContent = t.credits;
    document.getElementById('mFooter').textContent = t.footer;
    document.getElementById('loadTxt').textContent = t.load;
}

// START GAME
function startGame() {
    const menu = document.getElementById('menuScreen');
    menu.style.transition = 'opacity 0.5s';
    menu.style.opacity = '0';
    setTimeout(() => {
        menu.style.display = 'none';
        document.getElementById('gameScreen').classList.add('active');
        cursor.style.display = 'none';
        document.body.style.cursor = 'default';
        try { var ac = new (window.AudioContext||window.webkitAudioContext)(); ac.resume(); } catch(e){}
        GameMaker_Init();
    }, 500);
}

document.addEventListener('keydown', e => {
    if ((e.key === 'Enter' || e.key === ' ') && document.getElementById('menuScreen').style.display === 'flex') startGame();
});

</script>
</body>
</html>
